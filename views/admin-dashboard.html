<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="/styles.css">

  <style>
    /* Center the dashboard content better */
    .admin-dashboard-body {
      background: #ffeef4;
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Dashboard container upgrade */
    .admin-dashboard-container {
      background: white;
      width: 95%;
      max-width: 1200px;
      margin-top: 30px;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      border: 2px solid #ffd3e6;
      animation: fadeIn 0.8s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Table improvements */
    .booking-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      border-radius: 12px;
      overflow: hidden;
    }

    .booking-table th {
      background: #ff9acb;
      color: white;
      padding: 12px;
      font-size: 16px;
    }

    .booking-table td {
      padding: 12px;
      border-bottom: 1px solid #ffd3e6;
      font-size: 15px;
      background: #fff7fb;
    }

    .booking-table tr:nth-child(even) td {
      background: #ffeef7;
    }

    /* Buttons under table */
    .dashboard-buttons {
      margin-top: 25px;
      text-align: center;
    }

    .dashboard-buttons a {
      margin: 0 8px;
    }

    /* Edit popup upgrade */
    .edit-popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .edit-box {
      background: white;
      padding: 25px;
      width: 380px;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      border: 2px solid #ffd3e6;
      animation: fadeIn 0.4s ease-out forwards;
    }
  </style>
</head>

<body class="admin-dashboard-body">

  <!-- Pink Header Image -->
  <img src="/images/your-logo.png" class="custom-header" alt="Header Image">

  <div class="admin-dashboard-container">
    <h1 class="dashboard-title">Hello Yuri</h1>
    <h2 class="dashboard-subtitle">All Bookings</h2>

    <table class="booking-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Email</th>
          <th>Breed</th>
          <th>Dog Name</th>
          <th>Date</th>
          <th>Time</th>
          <th>Edit</th>
          <th>Delete</th>
        </tr>
      </thead>

      <tbody id="bookingData">
        {{rows}}
      </tbody>
    </table>

    <!-- GALLERY MANAGEMENT SECTION -->
    <div class="gallery-management">
      <h2 class="dashboard-subtitle">Gallery Management</h2>
      <p>Add new images to your gallery</p>

      <form action="/upload-image" method="POST" enctype="multipart/form-data" class="upload-form">
        <input type="file" name="image" accept="image/*" required>
        <button type="submit" class="upload-btn">Upload Image to Gallery</button>
      </form>

      <div class="gallery-preview">
        <h3>Current Gallery Images</h3>
        <div class="gallery-grid-admin">
          {{galleryImages}}
        </div>
      </div>
    </div>

    <div class="dashboard-buttons">
      <a href="/" class="gallery-under-btn">← Back Home</a>
      <a href="/logout" class="gallery-under-btn">Logout</a>
    </div>
  </div>

  <div id="imageModal" class="image-modal" aria-hidden="true">
    <button type="button" class="image-modal-close" aria-label="Close image view">×</button>
    <img id="imageModalImage" alt="Enlarged gallery image">
  </div>

  <!-- EDIT POPUP -->
  <div id="editPopup" class="edit-popup">
    <div class="edit-box">
      <h2>Edit Booking</h2>

      <form id="editForm">
        <input type="hidden" id="edit-id">

        <input id="edit-name" placeholder="Name" required>
        <input id="edit-number" placeholder="Phone" required>
        <input id="edit-email" placeholder="Email" required>
        <input id="edit-dogBreed" placeholder="Dog Breed" required>
        <input id="edit-dogName" placeholder="Dog Name" required>

        <label>Select Date</label>
        <input type="date" id="edit-date" required>

        <label>Select Time</label>
        <select id="edit-time" required>
          <option>9:00 AM</option>
          <option>10:00 AM</option>
          <option>11:00 AM</option>
          <option>12:00 PM</option>
          <option>1:00 PM</option>
          <option>2:00 PM</option>
          <option>3:00 PM</option>
        </select>

        <button class="save-edit-btn">Save</button>
        <button type="button" class="cancel-edit-btn" onclick="closeEdit()">Cancel</button>
      </form>
    </div>
  </div>

<script>
function openEditFromRow(button) {
  const row = button.closest('tr');
  const booking = JSON.parse(row.dataset.booking);
  
  document.getElementById("edit-id").value = booking.id;
  document.getElementById("edit-name").value = booking.name;
  document.getElementById("edit-number").value = booking.number;
  document.getElementById("edit-email").value = booking.email;
  document.getElementById("edit-dogBreed").value = booking.dogBreed;
  document.getElementById("edit-dogName").value = booking.dogName;
  document.getElementById("edit-date").value = booking.date;
  document.getElementById("edit-time").value = booking.time;

  document.getElementById("editPopup").style.display = "flex";
}

function closeEdit() {
  document.getElementById("editPopup").style.display = "none";
}

document.getElementById("editForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    id: document.getElementById("edit-id").value,
    name: document.getElementById("edit-name").value,
    number: document.getElementById("edit-number").value,
    email: document.getElementById("edit-email").value,
    dogBreed: document.getElementById("edit-dogBreed").value,
    dogName: document.getElementById("edit-dogName").value,
    date: document.getElementById("edit-date").value,
    time: document.getElementById("edit-time").value
  };

  await fetch("/edit-booking", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  location.reload();
});

async function deleteBooking(id) {
  if (!confirm("Delete this booking?")) return;

  await fetch("/delete-booking", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id })
  });

  location.reload();
}

function setupGalleryLightbox() {
  const modal = document.getElementById("imageModal");
  const modalImage = document.getElementById("imageModalImage");

  if (!modal || !modalImage) return;

  document.querySelectorAll(".gallery-image").forEach(img => {
    img.addEventListener("click", () => {
      modalImage.src = img.src;
      modalImage.alt = img.alt || "Gallery image";
      modal.classList.add("active");
      modal.setAttribute("aria-hidden", "false");
    });
  });

  modal.addEventListener("click", (event) => {
    if (event.target === modal || event.target.classList.contains("image-modal-close")) {
      modal.classList.remove("active");
      modal.setAttribute("aria-hidden", "true");
    }
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") {
      modal.classList.remove("active");
      modal.setAttribute("aria-hidden", "true");
    }
  });
}

document.addEventListener("DOMContentLoaded", () => {
  setupGalleryLightbox();

  document.querySelectorAll(".delete-image-btn").forEach(button => {
    button.addEventListener("click", async () => {
      const filename = button.dataset.filename;
      if (!confirm("Remove this image from the gallery?")) return;

      const response = await fetch("/delete-image", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename })
      });

      if (response.ok) {
        button.closest(".gallery-card-admin").remove();
      } else {
        alert("Could not remove the image.");
      }
    });
  });
});
</script>

</body>
</html>
