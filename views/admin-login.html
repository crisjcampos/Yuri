<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <link rel="stylesheet" href="/styles.css">

  <style>
    /* Page layout */
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #ffeef4;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* Header spacing for this page */
    .custom-header {
      margin: 20px auto 20px auto;
    }

    /* Area below header that centers the card */
    .full-center {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    /* Glass-style login card */
    .admin-login-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 35px;
      width: 380px;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      border: 2px solid #ffd3e6;
      animation: fadeSlideIn 1s ease-out forwards;
      text-align: center;
      box-sizing: border-box;
    }

    @keyframes fadeSlideIn {
      0% { opacity: 0; transform: translateY(25px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .admin-login-card h2 {
      margin-bottom: 5px;
      font-size: 32px;
      color: #1f2d3a;
    }

    .admin-login-card p {
      margin-bottom: 25px;
      font-size: 16px;
      color: #4a5c6b;
    }

    /* Center the form content and inputs */
    .admin-login-card form {
      display: flex;
      flex-direction: column;
      align-items: center;      /* centers children horizontally */
      width: 100%;
    }

    .admin-login-card input {
      width: 100%;
      max-width: 100%;          /* no weird shrinking */
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ffc8dd;
      background: #fff7fb;
      margin-bottom: 15px;
      font-size: 16px;
      box-sizing: border-box;
      text-align: left;         /* keeps typing natural */
    }

    .admin-login-card input:focus {
      outline: none;
      border-color: #ff9acb;
      background: #ffffff;
    }

    .admin-login-card button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff9acb 0%, #ff7fb8 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255, 150, 200, 0.35);
      transition: 0.3s ease;
    }

    .admin-login-card button:hover {
      background: linear-gradient(135deg, #ff7fb8 0%, #ff5fa3 100%);
      box-shadow: 0 10px 30px rgba(255, 150, 200, 0.45);
      transform: translateY(-2px);
    }

    .back-home {
      margin-top: 20px;
      display: inline-block;
      color: #ff7fb8;
      font-weight: 600;
      text-decoration: none;
    }

    .back-home:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- Pink Header Image -->
  <img src="/images/your-logo.png" class="custom-header" alt="Header Image">

  <!-- Centered Login Card -->
  <div class="full-center">
    <div class="admin-login-card">
      <h2>Admin Login</h2>
      <p>Secure Access</p>

      <form action="/admin-login" method="POST">
        <input name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

      <a href="/" class="back-home">← Back Home</a>
    </div>
  </div>

</body>
</html>
